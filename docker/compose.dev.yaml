# Local development overrides — builds from source and enables hot reload.
#
# Usage (from repo root):
#   docker compose -f compose.yaml -f docker/compose.dev.yaml up --build

name: postmarked

services:
  api-migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/app

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/app
    command: celery -A app.tasks worker -l info

  beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/app

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      - API_BASE_URL=http://api:8000
      - PUBLIC_GOOGLE_MAPS_API_KEY=${PUBLIC_GOOGLE_MAPS_API_KEY}
      - PUBLIC_GOOGLE_MAPS_MAP_ID=${PUBLIC_GOOGLE_MAPS_MAP_ID}
      - HOST=0.0.0.0
      - PORT=4321
    ports:
      - "4321:4321"
