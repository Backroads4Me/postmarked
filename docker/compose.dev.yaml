# Local development overrides — builds from source and enables hot reload.
#
# Usage (from repo root):
#   docker compose -f compose.yaml -f docker/compose.dev.yaml up --build

name: postmarked

# We can use an anchor here just for the shared local build context and code mount
x-dev-base: &dev-base
  build:
    context: ./api
    dockerfile: Dockerfile
  volumes:
    - ./api:/app

services:
  api:
    <<: *dev-base
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  worker:
    <<: *dev-base
    command: celery -A app.tasks worker -l info

  beat:
    <<: *dev-base
    command: celery -A app.tasks beat -l info

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      - API_BASE_URL=http://api:8000
