services:
  proxy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile
      - ../pmtiles:/pmtiles:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    environment:
      - PUBLIC_BASE_URL=http://localhost
      - API_BASE_URL=http://api:8000
      - HOST=0.0.0.0
      - PORT=4321
    depends_on:
      - api
    restart: unless-stopped

  api-migrate:
    build:
      context: ../api
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/goodpath
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me}
      - APP_ENV=${APP_ENV:-dev}
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/goodpath
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me}
      - APP_ENV=${APP_ENV:-dev}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:8080,http://localhost:4321}
      - PYTHONPATH=/app
      - ORIGINALS_PATH=/originals
      - DERIVATIVES_PATH=/derivatives
      - INGEST_PATH=/ingest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    volumes:
      - originals:/originals
      - derivatives:/derivatives
      - ingest:/ingest
    restart: unless-stopped

  worker:
    build:
      context: ../api
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks", "worker", "-l", "info"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/goodpath
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me}
      - PYTHONPATH=/app
      - ORIGINALS_PATH=/originals
      - DERIVATIVES_PATH=/derivatives
      - INGEST_PATH=/ingest
    depends_on:
      - redis
      - db
      - api-migrate
    volumes:
      - originals:/originals
      - derivatives:/derivatives
      - ingest:/ingest
    restart: unless-stopped

  beat:
    build:
      context: ../api
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks", "beat", "-l", "info"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/goodpath
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  flower:
    image: mher/flower
    command: ["celery", "-A", "app.tasks", "flower"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:changeme}
    depends_on:
      - redis
    ports:
      - "5555:5555"
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-goodpath}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  originals:
  derivatives:
  backups:
  ingest:
  caddy_data:
  caddy_config:
