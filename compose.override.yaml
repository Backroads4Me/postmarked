services:
  web:
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    environment:
      - API_BASE_URL=http://api:8000
      - PUBLIC_MAP_PROVIDER=${PUBLIC_MAP_PROVIDER:-google}
      - PUBLIC_GOOGLE_MAPS_API_KEY=${PUBLIC_GOOGLE_MAPS_API_KEY}
      - PUBLIC_GOOGLE_MAPS_MAP_ID=${PUBLIC_GOOGLE_MAPS_MAP_ID}
      - HOST=0.0.0.0
      - PORT=4321
    ports:
      - "4321:4321"

  api-migrate:
    volumes:
      - ./api:/app

  api:
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  worker:
    volumes:
      - ./api:/app
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A app.tasks worker -l info

  beat:
    volumes:
      - ./api:/app
