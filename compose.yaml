name: postmarked

x-app-base: &app-base
  image: ghcr.io/backroads4me/postmarked-api:${IMAGE_TAG:-latest}
  env_file: .env
  environment:
    - PYTHONPATH=/app
    - MEDIA_DIR=/media
    - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-postmarked}
    - APP_BASE_URL=${APP_BASE_URL:-http://localhost:4321}
    - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
    - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    - ADMIN_DISPLAY_NAME=${ADMIN_DISPLAY_NAME:-Admin}
    - SMTP_HOST=${SMTP_HOST:-}
    - SMTP_PORT=${SMTP_PORT:-587}
    - SMTP_USERNAME=${SMTP_USERNAME:-}
    - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
    - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Postmarked}
    - SMTP_USE_TLS=${SMTP_USE_TLS:-false}
    - SMTP_USE_STARTTLS=${SMTP_USE_STARTTLS:-true}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  api:
    <<: *app-base
    container_name: api
    volumes:
      - ${MEDIA_DIR:-./data}:/media
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    <<: *app-base
    container_name: worker
    command: ["celery", "-A", "app.tasks", "worker", "-l", "info"]
    volumes:
      - ${MEDIA_DIR:-./data}:/media

  beat:
    <<: *app-base
    container_name: beat
    command: ["celery", "-A", "app.tasks", "beat", "-l", "info"]

  web:
    image: ghcr.io/backroads4me/postmarked-web:${IMAGE_TAG:-latest}
    container_name: web
    build:
      context: ./web
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=4321
      - PUBLIC_GOOGLE_MAPS_API_KEY=${PUBLIC_GOOGLE_MAPS_API_KEY:-}
      - PUBLIC_GOOGLE_MAPS_MAP_ID=${PUBLIC_GOOGLE_MAPS_MAP_ID:-}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4321:4321"
    restart: unless-stopped

  flower:
    profiles: ["tools"]
    image: mher/flower
    container_name: flower
    command:
      ["celery", "--broker", "redis://redis:6379/0", "flower", "--port=5555"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:changeme}
    depends_on:
      - redis
    ports:
      - "5555:5555"
    restart: unless-stopped

  db:
    build:
      context: ./docker/postgis
    image: postmarked-postgis:16
    container_name: postgis_db
    env_file: .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postmarked}
    volumes:
      - ${MEDIA_DIR:-./data}/db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postmarked}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
