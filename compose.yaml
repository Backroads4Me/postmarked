services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PUBLIC_BASE_URL=http://localhost
      - PUBLIC_MAP_PROVIDER=${PUBLIC_MAP_PROVIDER:-google}
      - API_BASE_URL=http://api:8000
      - HOST=0.0.0.0
      - PORT=4321
    depends_on:
      - api
    volumes:
      - ${GOODPATH_PMTILES_DIR:-../pmtiles}:/app/public/tiles:ro
    restart: unless-stopped

  api-migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/goodpath
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me}
      - APP_ENV=${APP_ENV:-dev}
      - GOODPATH_ADMIN_EMAIL=${GOODPATH_ADMIN_EMAIL:-admin@example.com}
      - GOODPATH_ADMIN_PASSWORD=${GOODPATH_ADMIN_PASSWORD:-admin123}
      - GOODPATH_ADMIN_DISPLAY_NAME=${GOODPATH_ADMIN_DISPLAY_NAME:-Ted & Family}
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/goodpath
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me}
      - APP_ENV=${APP_ENV:-dev}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:4321,http://localhost:8000}
      - GOODPATH_ADMIN_EMAIL=${GOODPATH_ADMIN_EMAIL:-admin@example.com}
      - GOODPATH_ADMIN_PASSWORD=${GOODPATH_ADMIN_PASSWORD:-admin123}
      - GOODPATH_ADMIN_DISPLAY_NAME=${GOODPATH_ADMIN_DISPLAY_NAME:-Ted & Family}
      - PYTHONPATH=/app
      - ORIGINALS_PATH=/originals
      - DERIVATIVES_PATH=/derivatives
      - INGEST_PATH=/ingest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    volumes:
      - ${GOODPATH_ORIGINALS_SOURCE:-originals}:/originals
      - ${GOODPATH_DERIVATIVES_SOURCE:-derivatives}:/derivatives
      - ${GOODPATH_INGEST_SOURCE:-ingest}:/ingest
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks", "worker", "-l", "info"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/goodpath
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-me}
      - PYTHONPATH=/app
      - ORIGINALS_PATH=/originals
      - DERIVATIVES_PATH=/derivatives
      - INGEST_PATH=/ingest
    depends_on:
      - redis
      - db
      - api-migrate
    volumes:
      - ${GOODPATH_ORIGINALS_SOURCE:-originals}:/originals
      - ${GOODPATH_DERIVATIVES_SOURCE:-derivatives}:/derivatives
      - ${GOODPATH_INGEST_SOURCE:-ingest}:/ingest
    restart: unless-stopped

  beat:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks", "beat", "-l", "info"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/goodpath
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - redis
      - db
    restart: unless-stopped

  flower:
    profiles: ["tools"]
    image: mher/flower
    command: ["celery", "--broker", "redis://redis:6379/0", "flower", "--port=5555"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:changeme}
    depends_on:
      - redis
    ports:
      - "5555:5555"
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-goodpath}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  originals:
  derivatives:
  ingest:
