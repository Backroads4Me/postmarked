name: postmarked

x-api-image: &api-image ghcr.io/backroads4me/postmarked-api:${IMAGE_TAG:-latest}

services:
  api:
    image: *api-image
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - ORIGINALS_PATH=/originals
      - DERIVATIVES_PATH=/derivatives
      - INGEST_PATH=/ingest
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postmarked}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${ORIGINALS_SOURCE:-originals}:/originals
      - ${DERIVATIVES_SOURCE:-derivatives}:/derivatives
      - ${INGEST_SOURCE:-ingest}:/ingest
    restart: unless-stopped

  worker:
    image: *api-image
    command: ["celery", "-A", "app.tasks", "worker", "-l", "info"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - ORIGINALS_PATH=/originals
      - DERIVATIVES_PATH=/derivatives
      - INGEST_PATH=/ingest
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postmarked}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${ORIGINALS_SOURCE:-originals}:/originals
      - ${DERIVATIVES_SOURCE:-derivatives}:/derivatives
      - ${INGEST_SOURCE:-ingest}:/ingest
    restart: unless-stopped

  beat:
    image: *api-image
    command: ["celery", "-A", "app.tasks", "beat", "-l", "info"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-postmarked}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/backroads4me/postmarked-web:${IMAGE_TAG:-latest}
    build:
      context: ./web
      args:
        PUBLIC_GOOGLE_MAPS_API_KEY: ${PUBLIC_GOOGLE_MAPS_API_KEY:-}
        PUBLIC_GOOGLE_MAPS_MAP_ID: ${PUBLIC_GOOGLE_MAPS_MAP_ID:-}
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=4321
    depends_on:
      - api
    ports:
      - "4321:4321"
    restart: unless-stopped

  flower:
    profiles: ["tools"]
    image: mher/flower
    command: ["celery", "--broker", "redis://redis:6379/0", "flower", "--port=5555"]
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
      - FLOWER_BASIC_AUTH=${FLOWER_BASIC_AUTH:-admin:changeme}
    depends_on:
      - redis
    ports:
      - "5555:5555"
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4-alpine
    env_file: .env
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  originals:
  derivatives:
  ingest:
